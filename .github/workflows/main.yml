name: CRD-RDP

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Install Chrome Remote Desktop
        run: |
          Invoke-WebRequest https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi -OutFile crd.msi
          Start-Process msiexec.exe -ArgumentList "/i crd.msi /quiet /norestart" -Wait

      - name: Instructions
        run: |
          Write-Host "Open this link:"
          Write-Host "https://remotedesktop.google.com/headless"
          Write-Host ""
          Write-Host "Copy the Windows command shown there"
          Write-Host "Run that command in a new workflow step"

      - name: Keep Runner Alive
        run: |
          while ($true) {
            Write-Host "RDP running..."
            Start-Sleep 300
          }
