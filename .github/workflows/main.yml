name: CRD-RDP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Download Chrome Remote Desktop
        run: |
          Invoke-WebRequest https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi -OutFile crd.msi
          Start-Process msiexec.exe -ArgumentList '/i crd.msi /quiet /norestart' -Wait

      - name: Install Chrome
        run: |
          Invoke-WebRequest https://www.slimjet.com/chrome/download-chrome-offline-installer.exe -OutFile chrome.exe
          Start-Process chrome.exe -ArgumentList '/silent /install' -Wait

      - name: Setup CRD
        run: |
          Write-Host "Go to https://remotedesktop.google.com/headless"
          Write-Host "Copy the Windows command shown there."
          Write-Host "Paste it in a new workflow step to activate the RDP."

      - name: Keep Alive
        run: |
          while ($true) {
            Write-Host "RDP running..."
            Start-Sleep 300
          }
