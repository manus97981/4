name: RustDesk-RDP

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Download RustDesk
        run: |
          $url="https://github.com/rustdesk/rustdesk/releases/download/1.2.3/rustdesk-1.2.3-x86_64.exe"
          Invoke-WebRequest $url -OutFile rustdesk.exe

      - name: Install RustDesk
        run: |
          Start-Process .\rustdesk.exe -ArgumentList "--silent-install" -Wait

      - name: Start RustDesk
        run: |
          Start-Process "C:\Program Files\RustDesk\rustdesk.exe"
          Start-Sleep 20

      - name: Show ID
        run: |
          & "C:\Program Files\RustDesk\rustdesk.exe" --get-id

      - name: Keep Alive
        run: |
          while ($true) {
            Start-Sleep 300
          }
